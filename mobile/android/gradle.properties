# Turkuaz Android derleme ayarları
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g
android.useAndroidX=true
android.enableJetifier=true

# Telefonlar için iki mimari yeter (emülatör istersen x86_64 ekle)
reactNativeArchitectures=armeabi-v7a,arm64-v8a

# Eski mimari: react-native-bare-kit + webview ile en sorunsuz yol (v1)
newArchEnabled=false
hermesEnabled=true
